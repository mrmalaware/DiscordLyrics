name: Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  package:
    name: Package plugin
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Validate and package
        run: npm run release:pack

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discordlyrics-release
          path: |
            dist/SpotifyLyricsStatus.plugin.js
            dist/vencord-spotifyLyricsStatus.zip
